version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finance-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 5003
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5003:5003"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run dev"

  # auth-svc: owns register/login/me and the User table. Shares the same
  # Postgres as the backend (transitional shared-database model) and the same
  # JWT_SECRET_KEY (inherited from backend/.env) so the tokens it signs verify
  # in every other service. The backend still owns migrations.
  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile.dev
    container_name: finance-ai-auth-svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres?schema=public
      JWT_EXPIRES_IN: 1h
    ports:
      - "5001:5001"

  # API gateway: the single public entrypoint. Reverse-proxies /api/v1/auth/* to
  # auth-svc and the rest of /api/v1/* to the backend, applies Redis-backed edge
  # rate limiting, and exposes health probes. Built from the repo root context
  # so the npm workspace + @finance-ai/shared are available.
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.dev
    container_name: finance-ai-gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      auth-svc:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8080
      AUTH_URL: http://auth-svc:5001
      BACKEND_URL: http://backend:5003
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: finance-ai-frontend
    restart: unless-stopped
    depends_on:
      - gateway
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # The browser talks to the gateway (host port 8080), which routes to
      # auth-svc and the backend. Overrides VITE_API_URL from ./frontend/.env.
      VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

