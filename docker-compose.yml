version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finance-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres?schema=public
      PORT: 5003
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5003:5003"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: finance-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

